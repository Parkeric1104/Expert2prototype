name = "expert2-llm-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# 허용할 프론트엔드 도메인(선택). 프로덕션은 내 GitHub Pages 도메인으로 좁히는 것을 권장.
# 미설정 시 worker.js가 "*"(전체 허용)로 동작 — 프로토타입 데모용.
[vars]
# ALLOW_ORIGIN = "https://<your-username>.github.io"

# ⚠️ GEMINI_API_KEY 는 여기 두지 말 것. 아래로 등록(암호화된 서버 시크릿):
#     wrangler secret put GEMINI_API_KEY
